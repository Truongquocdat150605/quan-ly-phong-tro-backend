# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:YOUR_EMAIL}
spring.mail.password=${MAIL_PASSWORD:YOUR_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Telegram Configuration
app.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}

# PayOS Configuration
payos.clientId=${PAYOS_CLIENT_ID:YOUR_PAYOS_CLIENT_ID}
payos.apiKey=${PAYOS_API_KEY:YOUR_PAYOS_API_KEY}
payos.checksumKey=${PAYOS_CHECKSUM_KEY:YOUR_PAYOS_CHECKSUM_KEY}

# Stripe Configuration
stripe.secret.key=${STRIPE_SECRET_KEY:YOUR_STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:YOUR_STRIPE_PUBLISHABLE_KEY}

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# Upload folder. On deployment, point APP_UPLOAD_DIR to a persistent disk/folder.
app.upload-dir=${APP_UPLOAD_DIR:uploads}
