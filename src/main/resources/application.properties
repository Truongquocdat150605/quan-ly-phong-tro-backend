# Database Configuration
spring.profiles.active=dev

# Database Configuration (Tự động chuyển đổi: Dùng Cloud nếu có biến môi trường, ngược lại dùng Local)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/quan_ly_phong_tro?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=8082
server.servlet.context-path=/

# JWT Configuration
app.jwt.secret=coffee-shop-jwt-secret-key-2024-lab06-spring-boot
app.jwt.expiration=86400000

# File Upload Configuration
spring.web.resources.static-locations=file:uploads/,classpath:/static/

# Multipart Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Cache / Compression / DB pool tuning (performance)
# Gzip compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,text/javascript,application/javascript,application/octet-stream
server.compression.min-response-size=1024

# HikariCP (Spring Boot dA1ng Hikari mc `<nh)
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=20000
