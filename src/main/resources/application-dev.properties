# Gmail SMTP Configuration for local development
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL
spring.mail.password=YOUR_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.upload-dir=${APP_UPLOAD_DIR:uploads}

# Scheduler sinh hoa don hang thang - cau hinh that: 00:00 ngay 1 moi thang.
app.billing.monthly-cron=0 0 0 1 * ?
app.billing.scheduler-force-create=false

